<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Save the Date - David & Rachel</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/custom.css" />

	<link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        /* Custom typography structure. Colours are inherited from custom.css.
           Selectors are scoped to #header .content so they reliably beat the
           sitewide "#header .content p" rule in custom.css.

           Four sizes total: hero, feature, accent, info.
           Everything in the "info" tier (labels, date day/year, venue name
           and suburb) is told apart by weight, case, colour and italics,
           not by size. */

		#header .content .inner {
            padding: 4rem 3rem;
            text-align: center;
            position: relative;
        }

#header .content .label {
            font-size: 13px;
            font-weight: 600;
            color: #2d5a1e;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0;
        }

        #header .content h1.script {
            font-family: 'Great Vibes', cursive;
            font-size: 84px;
            font-weight: 400;
            color: #5a2e82;
            line-height: 1.15;
            margin: 6px 0 18px;
            text-transform: none;
            letter-spacing: normal;
            border-bottom: none;
        }

        #header .content .names {
            font-size: 44px;
            font-weight: 600;
            line-height: 1.15;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin: 20px 0;
            color: #5a2e82;
        }

        #header .content .names em {
            font-style: normal;
        }

        #header .content .ampersand {
            display: block;
            font-size: 24px;
            font-weight: 600;
            font-style: normal;
            color: #5a2e82;
            margin: 4px 0;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 20px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #c4a457;
        }

        .divider-diamond {
            width: 6px;
            height: 6px;
            background: #c4a457;
            transform: rotate(45deg);
            flex-shrink: 0;
        }

        .date-block {
            margin: 24px 0 0;
        }

        #header .content .date-day {
            font-size: 13px;
            font-weight: 600;
            color: #2d5a1e;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0;
        }

        #header .content .date-numerals {
            font-size: 44px;
            font-weight: 600;
            line-height: 1;
            letter-spacing: 0.15em;
            margin: 6px 0;
            color: #5a2e82;
        }

        #header .content .date-year {
            font-size: 13px;
            font-weight: 600;
            color: #2d5a1e;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0;
        }

        .location-block {
            margin-top: 30px;
        }

        #header .content .venue-name {
            font-size: 13px;
            font-weight: 600;
            color: #2d5a1e;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0;
        }

        #header .content .venue-suburb {
            font-size: 13px;
            font-weight: 600;
            color: #2d5a1e;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-style: normal;
            margin-top: 6px;
        }

        /* De-emphasise the copyright line. Matches custom.css's selector
           exactly so this rule wins on cascade order, no !important needed. */
        #footer .copyright {
            font-size: 13px;
            font-weight: 600;
            color: #2d5a1e;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0.55;
        }

        @media (max-width: 520px) {
            #header .content h1.script { font-size: 60px; }
            #header .content .names,
            #header .content .date-numerals { font-size: 34px; }
            #header .content .ampersand { font-size: 18px; }
            #header .content .label,
            #header .content .date-day,
            #header .content .date-year,
            #header .content .venue-name,
            #header .content .venue-suburb { font-size: 12px; }
            #header .content .inner { padding: 3rem 1.5rem; }
        }
    </style>
</head>
<body class="is-preload">

    <div id="wrapper">
        <header id="header">
            <div class="content">
                <div class="inner">
                        <p class="label">Please</p>
                        <h1 class="script">Save the Date</h1>
                        <p class="label">for the wedding of</p>

                        <div class="divider">
                            <span class="divider-diamond"></span>
                        </div>

                        <div class="names">
                            <em>David</em>
                            <span class="ampersand">&amp;</span>
                            <em>Rachel</em>
                        </div>

                        <div class="divider">
                            <span class="divider-diamond"></span>
                        </div>

<div class="date-block">
                            <p class="date-day">Saturday</p>
                            <p class="date-numerals">17.04</p>
                            <p class="date-year">2027</p>
                        </div>

                        <div class="location-block">
                            <p class="venue-name">Puss &amp; Mew</p>
                            <p class="venue-suburb">Nunawading, Victoria, Australia</p>
                        </div>
                    </div>
                </div>
        </header>

        <footer id="footer">
            <p class="copyright">&copy; 2026 HOUSE OF HONK</p>
        </footer>
    </div>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>

</body>
</html>
